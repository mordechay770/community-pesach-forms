<!DOCTYPE html>
<html lang="ru" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pesach Form Submitted</title>
  <link rel="stylesheet" href="./styles.css">
  <style>
    .success-logo{
      width:96px;
      height:auto;
      display:block;
      margin:0 0 14px;
      filter:drop-shadow(0 10px 18px rgba(0,0,0,.18));
    }
    .success-topmark{
      display:flex;
      justify-content:flex-start;
      align-items:center;
      margin-bottom:-2px;
    }
    .success-shell{
      width:min(980px,94vw);
      margin:24px auto 56px;
      display:grid;
      gap:18px;
    }
    .success-hero{
      background:linear-gradient(135deg,var(--navy) 0%,var(--navy-2) 100%);
      color:#fff;
      border-radius:28px;
      padding:28px;
      box-shadow:var(--shadow);
    }
    .success-hero h1{
      margin:0 0 12px;
      font-size:38px;
      line-height:1.08;
    }
    .success-hero p{
      margin:0;
      color:#edf3f8;
      line-height:1.7;
    }
    .link-grid{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:16px;
    }
    .link-card{
      background:var(--paper);
      border:1px solid var(--line);
      border-radius:24px;
      padding:20px;
      box-shadow:var(--shadow);
      display:grid;
      gap:12px;
    }
    .link-card h2{
      margin:0;
      color:var(--navy);
      font-size:24px;
    }
    .link-card p{
      margin:0;
      color:var(--muted);
      line-height:1.6;
    }
    .link-card a{
      text-decoration:none;
      display:inline-block;
      border-radius:14px;
      padding:12px 16px;
      background:linear-gradient(135deg,var(--gold) 0%,#d8b36b 100%);
      color:#1c2935;
      font-weight:800;
    }
    @media (max-width:680px){
      .link-grid{grid-template-columns:1fr}
    }
  </style>
</head>
<body data-page-type="success">
  <main class="success-shell">
    <div class="success-topmark">
      <img src="./assets/logo/logo2%20-.png" alt="Chabad Almaty logo" class="success-logo">
    </div>
    <section class="success-hero">
      <p class="eyebrow" data-content="success-eyebrow">Pesach 5786</p>
      <h1 data-content="success-title">Спасибо, форма успешно отправлена</h1>
      <p data-content="success-description">Ваши данные получены и сохранены в системе. Если потребуется дополнительная проверка, с вами свяжутся. Ниже можно перейти к полезной информации о Песахе и о программах еврейского центра.</p>
    </section>

    <section class="link-grid" data-content="success-cards"></section>
  </main>
  <script src="./content-pages.js"></script>
</body>
</html>
